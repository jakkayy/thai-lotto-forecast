services:
  postgres:
    image: postgres:16-alpine
    container_name: lotto_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lotto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lotto}
      POSTGRES_DB: ${POSTGRES_DB:-lotto}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lotto}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: lotto_mlflow
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://${POSTGRES_USER:-lotto}:${POSTGRES_PASSWORD:-lotto}@postgres:5432/${POSTGRES_DB:-lotto}
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    command: >
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER:-lotto}:${POSTGRES_PASSWORD:-lotto}@postgres:5432/${POSTGRES_DB:-lotto}
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  mlflow_artifacts:
